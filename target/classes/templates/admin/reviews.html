<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>评价管理 - 校园二手交易平台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/nav :: admin('reviews')}"></header>

<main class="container">
    <section class="card">
        <h2>评价管理</h2>
        <table>
            <thead>
            <tr><th>ID</th><th>订单号</th><th>商品</th><th>评价人</th><th>被评价人</th><th>评分</th><th>内容</th><th>评价时间</th></tr>
            </thead>
            <tbody>
            <tr th:each="r : ${reviews}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.orderId}"></td>
                <td th:text="${r.productTitle}"></td>
                <td th:text="${r.reviewerName}"></td>
                <td th:text="${r.targetUserName}"></td>
                <td><span class="stars" th:text="${r.score} + '分'"></span></td>
                <td th:text="${r.content}"></td>
                <td th:text="${#temporals.format(r.createTime, 'yyyy-MM-dd HH:mm')}"></td>
            </tr>
            <tr th:if="${#lists.isEmpty(reviews)}"><td colspan="8">暂无评价</td></tr>
            </tbody>
        </table>

        <div class="pager">
            <a th:if="${page > 1}" th:href="@{/admin/reviews(page=${page - 1})}">上一页</a>
            <span th:text="'第 ' + ${page} + ' / ' + ${totalPage} + ' 页'"></span>
            <a th:if="${page < totalPage}" th:href="@{/admin/reviews(page=${page + 1})}">下一页</a>
        </div>
    </section>
</main>
</body>
</html>
