server:
  port: 8080

spring:
  datasource:
    # 先在 PostgreSQL 中创建数据库 secondhand_db，再执行 sql/schema.sql
    url: jdbc:postgresql://localhost:5432/secondhand_db
    username: postgres
    password: 123156
    driver-class-name: org.postgresql.Driver
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 25MB
  thymeleaf:
    cache: false

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.example.secondhand.entity
  configuration:
    map-underscore-to-camel-case: true
