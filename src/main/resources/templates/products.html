<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>商品市场 - 校园二手交易平台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/nav :: main('products')}"></header>

<main class="container wide market-page slide-world">
    <section class="market-header">
        <div>
            <span class="stage-kicker">Student market</span>
            <h1>二手商品</h1>
            <p>把校园里的闲置物品做成一面可搜索、可筛选、可直接交易的市集墙。</p>
            <div class="actions" th:if="${session.user != null}">
                <a class="btn btn-arrow" href="/products/new"><span>发布商品</span><i>›</i></a>
                <a class="btn secondary btn-arrow" href="/recommendations"><span>为你推荐</span><i>›</i></a>
            </div>
        </div>

        <form class="search-form market-search" method="get" action="/products">
            <label>
                <span>关键词</span>
                <input name="keyword" placeholder="搜索商品标题或描述" th:value="${keyword}">
            </label>
            <label>
                <span>分类</span>
                <select name="categoryId">
                    <option value="">全部分类</option>
                    <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"
                            th:selected="${categoryId != null and categoryId == c.id}"></option>
                </select>
            </label>
            <button type="submit">查询</button>
        </form>
    </section>

    <section class="product-gallery">
        <article class="product-card gallery-card" th:each="p : ${products}">
            <div class="product-media">
                <img th:if="${p.mainImageUrl != null}" th:src="${p.mainImageUrl}" alt="商品图片">
                <div class="no-img" th:if="${p.mainImageUrl == null}">暂无图片</div>
            </div>
            <div class="gallery-card-body">
                <p class="meta"><span th:text="${p.categoryName}"></span> · 卖家：<span th:text="${p.sellerName}"></span></p>
                <h3 th:text="${p.title}">商品标题</h3>
                <div class="gallery-card-foot">
                    <p class="price" th:text="'￥' + ${p.price}">￥0</p>
                    <a class="btn btn-arrow" th:href="@{/products/{id}(id=${p.id})}"><span>详情</span><i>›</i></a>
                </div>
            </div>
        </article>
    </section>

    <div class="pager">
        <a th:if="${page > 1}" th:href="@{/products(page=${page - 1}, keyword=${keyword}, categoryId=${categoryId})}">上一页</a>
        <span th:text="${page} + ' / ' + ${totalPage}"></span>
        <a th:if="${page < totalPage}" th:href="@{/products(page=${page + 1}, keyword=${keyword}, categoryId=${categoryId})}">下一页</a>
    </div>
</main>
<script th:src="@{/js/page-effects.js}"></script>
</body>
</html>
