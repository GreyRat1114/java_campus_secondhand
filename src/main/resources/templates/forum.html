<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>校园论坛 - 校园二手交易平台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<header th:replace="~{fragments/nav :: main('forum')}"></header>

<main class="container wide forum-page slide-world">
    <div class="success" th:if="${success != null}" th:text="${success}"></div>
    <div class="error" th:if="${error != null}" th:text="${error}"></div>

    <section class="forum-stage">
        <div>
            <span class="stage-kicker">Campus forum</span>
            <h1>校园论坛</h1>
            <p>把交易需求、经验交流和商品讨论放在一起，让帖子不只是列表，而像一张校园消息墙。</p>
        </div>
        <div class="actions" th:if="${session.user != null}">
            <a class="btn btn-arrow" href="/forum/new"><span>我要发帖</span><i>›</i></a>
            <a class="btn secondary btn-arrow" href="/my/posts"><span>我的帖子</span><i>›</i></a>
        </div>
        <a class="btn btn-arrow" th:if="${session.user == null}" href="/login"><span>登录后发帖</span><i>›</i></a>
    </section>

    <section class="forum-search-panel">
        <form method="get" action="/forum" class="search-form market-search">
            <label>
                <span>关键词</span>
                <input type="text"
                       name="keyword"
                       placeholder="搜索帖子标题或内容"
                       th:value="${keyword}">
            </label>
            <label>
                <span>板块</span>
                <select name="boardId">
                    <option value="">全部板块</option>
                    <option th:each="b : ${boards}"
                            th:value="${b.id}"
                            th:selected="${boardId != null and boardId == b.id}"
                            th:text="${b.name}">
                    </option>
                </select>
            </label>
            <label>
                <span>类型</span>
                <select name="postType">
                    <option value="">全部类型</option>
                    <option value="NEED" th:selected="${postType == 'NEED'}">交易需求</option>
                    <option value="DISCUSS" th:selected="${postType == 'DISCUSS'}">校园交流</option>
                </select>
            </label>
            <button type="submit">搜索</button>
        </form>
    </section>

    <section class="forum-list">
        <article class="forum-item forum-thread" th:each="p : ${posts}">
            <div class="forum-item-main">
                <div>
                    <span class="badge" th:if="${p.boardName != null}" th:text="${p.boardName}"></span>
                    <span class="badge" th:text="${p.postTypeText}"></span>
                    <a class="forum-title"
                       th:href="@{/forum/{id}(id=${p.id})}"
                       th:text="${p.title}">
                    </a>
                </div>
                <p class="forum-summary" th:text="${#strings.abbreviate(p.content, 120)}"></p>
                <div class="linked-product-mini" th:if="${p.productId != null}">
                    <span>关联商品：</span>
                    <a th:href="@{/products/{id}(id=${p.productId})}"
                       th:text="${p.productTitle}">
                    </a>
                </div>
                <div class="forum-meta">
                    <span>楼主：<b th:text="${p.username}"></b></span>
                    <span>浏览：<b th:text="${p.viewCount}"></b></span>
                    <span>回复：<b th:text="${p.commentCount}"></b></span>
                    <span th:text="${#temporals.format(p.createTime, 'yyyy-MM-dd HH:mm')}"></span>
                </div>
            </div>
        </article>

        <section class="card" th:if="${#lists.isEmpty(posts)}">
            暂无帖子，可以发布第一条帖子。
        </section>
    </section>

    <div class="pager">
        <a th:if="${page > 1}"
           th:href="@{/forum(page=${page - 1}, keyword=${keyword}, postType=${postType}, boardId=${boardId})}">
            上一页
        </a>
        <span th:text="'第 ' + ${page} + ' / ' + ${totalPage} + ' 页'"></span>
        <a th:if="${page < totalPage}"
           th:href="@{/forum(page=${page + 1}, keyword=${keyword}, postType=${postType}, boardId=${boardId})}">
            下一页
        </a>
    </div>
</main>
<script th:src="@{/js/page-effects.js}"></script>
</body>
</html>
