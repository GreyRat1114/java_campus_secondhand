<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>登录 - 校园二手交易平台</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="page-center">
<div class="card login-card">
    <h2>校园二手交易平台</h2>
    <p class="sub-title">登录后可发布商品、购买商品、查看订单</p>
    <div class="success" th:text="${success}"></div>
    <div class="error" th:text="${error}"></div>
    <form method="post" action="/login">
        <input name="username" placeholder="用户名" required>
        <input name="password" type="password" placeholder="密码" required>
        <button type="submit">登录</button>
    </form>
    <p class="hint">没有账号？<a href="/register">去注册</a></p>
    <p class="hint">管理员：admin / admin123　普通用户：zhangsan / user123</p>
</div>
</body>
</html>
